<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard — Women of the Bible Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; Back to Home</a>

    <!-- LOGIN -->
    <div id="loginSection">
      <div class="page-header">
        <h1>Teacher Dashboard</h1>
        <p>Manage assignments and track student progress</p>
      </div>
      <div class="card name-input-card" style="max-width:400px; margin:0 auto;">
        <h3 style="text-align:center; margin-bottom:20px;">Enter Teacher PIN</h3>
        <div class="form-group">
          <input type="password" id="pinInput" placeholder="Enter PIN..." maxlength="10" style="text-align:center; font-size:1.5rem; letter-spacing:8px; width:100%; padding:14px; border:2px solid #e0e0e0; border-radius:12px;">
        </div>
        <button class="btn btn-primary btn-block btn-lg" onclick="teacherLogin()">Login</button>
        <p id="loginError" style="color:var(--danger); text-align:center; margin-top:10px; display:none;"></p>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardSection" class="hidden">
      <div class="page-header">
        <h1>Teacher Dashboard</h1>
        <p id="dashboardDate"></p>
      </div>

      <!-- Create Assignment -->
      <div class="card" style="margin-bottom:20px;">
        <h3 style="margin-bottom:15px;">Create Assignment</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:end;">
          <div class="form-group" style="flex:1; min-width:120px; margin-bottom:0;">
            <label>Date</label>
            <input type="date" id="assignDate" style="width:100%; padding:10px; border:2px solid #e0e0e0; border-radius:10px;">
          </div>
          <div class="form-group" style="flex:1; min-width:120px; margin-bottom:0;">
            <label>Label</label>
            <input type="text" id="assignLabel" placeholder="e.g. Morning Set" maxlength="30" style="width:100%; padding:10px; border:2px solid #e0e0e0; border-radius:10px;">
          </div>
          <div class="form-group" style="width:80px; margin-bottom:0;">
            <label>Questions</label>
            <select id="assignCount" style="width:100%; padding:10px; border:2px solid #e0e0e0; border-radius:10px;">
              <option value="10" selected>10</option>
              <option value="15">15</option>
              <option value="20">20</option>
            </select>
          </div>
          <div class="form-group" style="width:90px; margin-bottom:0;">
            <label>Timer</label>
            <select id="assignTimer" style="width:100%; padding:10px; border:2px solid #e0e0e0; border-radius:10px;">
              <option value="30">30s</option>
              <option value="45" selected>45s</option>
              <option value="60">60s</option>
              <option value="90">90s</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="createAssignment()">Create</button>
        </div>
        <p id="assignMsg" style="margin-top:10px; font-weight:600; display:none;"></p>
      </div>

      <!-- Tab Navigation -->
      <div style="display:flex; gap:8px; margin-bottom:15px; flex-wrap:wrap;">
        <button class="diff-btn active" id="tabToday" onclick="switchTab('today')">Today</button>
        <button class="diff-btn" id="tabAll" onclick="switchTab('all')">All Assignments</button>
        <button class="diff-btn" id="tabStudents" onclick="switchTab('students')">Students</button>
        <button class="diff-btn" id="tabBackup" onclick="switchTab('backup')">Backup</button>
      </div>

      <!-- TODAY TAB -->
      <div id="todayTab">
        <div id="todayAssignments"><p style="color:var(--text-light);">Loading...</p></div>
      </div>

      <!-- ALL ASSIGNMENTS TAB -->
      <div id="allTab" class="hidden">
        <div id="allAssignments"><p style="color:var(--text-light);">Loading...</p></div>
      </div>

      <!-- STUDENTS TAB -->
      <div id="studentsTab" class="hidden">
        <div id="studentsList"><p style="color:var(--text-light);">Loading...</p></div>
      </div>

      <!-- BACKUP TAB -->
      <div id="backupTab" class="hidden">
        <div class="card">
          <h3 style="margin-bottom:10px;">Data Backup & Restore</h3>
          <p style="color:var(--text-light); font-size:0.85rem; margin-bottom:15px;">Download your data regularly to keep a backup. Restore if data is ever lost after a server update.</p>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-secondary" onclick="exportData()">Download Backup</button>
            <label class="btn btn-gold" style="cursor:pointer;">
              Restore Backup
              <input type="file" accept=".json" style="display:none;" onchange="importData(event)">
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let teacherPin = '';
    let dashboardData = null;

    document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') teacherLogin(); });
    document.getElementById('assignDate').value = new Date().toISOString().slice(0, 10);

    function switchTab(tab) {
      ['today','all','students','backup'].forEach(t => {
        document.getElementById(t + 'Tab').classList.add('hidden');
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('active');
      });
      document.getElementById(tab + 'Tab').classList.remove('hidden');
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    }

    async function teacherLogin() {
      const pin = document.getElementById('pinInput').value.trim();
      if (!pin) return;
      try {
        const res = await fetch('/api/teacher/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pin }) });
        const data = await res.json();
        if (data.success) { teacherPin = pin; document.getElementById('loginSection').classList.add('hidden'); document.getElementById('dashboardSection').classList.remove('hidden'); refreshDashboard(); }
        else { document.getElementById('loginError').textContent = 'Incorrect PIN.'; document.getElementById('loginError').style.display = 'block'; }
      } catch (e) { document.getElementById('loginError').textContent = 'Connection error.'; document.getElementById('loginError').style.display = 'block'; }
    }

    async function refreshDashboard() {
      document.getElementById('dashboardDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      try {
        const res = await fetch(`/api/teacher/dashboard?pin=${teacherPin}`);
        dashboardData = await res.json();
        renderTodayTab();
        renderAllTab();
        renderStudentsTab();
      } catch (e) { console.error('Dashboard error:', e); }
    }

    function renderTodayTab() {
      const d = dashboardData;
      if (!d.todayAssignments || d.todayAssignments.length === 0) {
        document.getElementById('todayAssignments').innerHTML = '<div class="card"><p style="color:var(--text-light); text-align:center;">No assignments for today. Create one above!</p></div>';
        return;
      }
      document.getElementById('todayAssignments').innerHTML = d.todayAssignments.map(a => {
        let scoresHTML = '';
        if (a.completedBy.length > 0) {
          scoresHTML = a.completedBy.map(s => {
            // Show each attempt separately
            const attemptsDetail = s.attempts ? s.attempts.map(att =>
              `<div style="padding:4px 0 4px 20px; font-size:0.85rem; color:var(--text-light);">Attempt ${att.attempt}: <strong>${att.correct}/${att.total}</strong> (${Math.round(att.correct/att.total*100)}%) — <strong style="color:var(--primary);">${att.score} pts</strong> <span style="font-size:0.75rem;">${att.completedAt ? new Date(att.completedAt).toLocaleTimeString() : ''}</span></div>`
            ).join('') : '';
            return `<div style="background:var(--bg-light); border-radius:10px; padding:12px; margin-bottom:8px; border-left:3px solid var(--primary);">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <strong>${s.name}</strong>
                <span style="font-size:0.85rem; color:var(--text-light);">${s.totalAttempts}/3 attempts</span>
              </div>
              ${attemptsDetail}
            </div>`;
          }).join('');
        } else {
          scoresHTML = '<p style="color:var(--text-light); font-size:0.9rem; padding:8px;">No one has completed this yet.</p>';
        }

        // Show who hasn't attempted
        const kidNames = ['Caleb','Karson','Glenda','Erlyssa','Israel'];
        const completedNames = a.completedBy.map(s => s.name.toLowerCase());
        const missing = kidNames.filter(n => !completedNames.includes(n.toLowerCase()));
        const missingHTML = missing.length > 0
          ? `<div style="margin-top:8px; padding:8px; background:#fff3cd; border-radius:8px; font-size:0.85rem;"><strong>Not attempted:</strong> ${missing.join(', ')}</div>`
          : '<div style="margin-top:8px; padding:8px; background:#d4edda; border-radius:8px; font-size:0.85rem;">All kids completed!</div>';

        return `<div class="card" style="margin-bottom:15px; border-left:4px solid var(--primary);">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div><h3 style="color:var(--primary); margin:0;">${a.label}</h3><span style="font-size:0.85rem; color:var(--text-light);">${a.questionCount} questions | ${a.date}</span></div>
            <span style="font-weight:700; color:var(--success);">${a.totalCompletions} completed</span>
          </div>
          ${scoresHTML}
          ${missingHTML}
        </div>`;
      }).join('');
    }

    function renderAllTab() {
      const assignments = dashboardData.allAssignments;
      if (!assignments || assignments.length === 0) {
        document.getElementById('allAssignments').innerHTML = '<div class="card"><p style="color:var(--text-light); text-align:center;">No assignments yet.</p></div>';
        return;
      }

      // Group by date
      const byDate = {};
      assignments.forEach(a => { if (!byDate[a.date]) byDate[a.date] = []; byDate[a.date].push(a); });

      document.getElementById('allAssignments').innerHTML = Object.entries(byDate)
        .sort((a, b) => b[0].localeCompare(a[0]))
        .map(([date, assigns]) => {
          const assignHTML = assigns.map(a =>
            `<div style="display:flex; justify-content:space-between; padding:10px; background:var(--bg-light); border-radius:8px; margin-bottom:6px;">
              <div><strong>${a.label}</strong> <span style="font-size:0.85rem; color:var(--text-light);">(${a.questionCount} Q, ${a.timer || 45}s timer)</span></div>
              <button onclick="viewAssignment('${a.id}')" style="background:var(--primary); color:white; border:none; padding:6px 14px; border-radius:8px; cursor:pointer; font-size:0.85rem;">View Scores</button>
            </div>`
          ).join('');
          return `<div class="card" style="margin-bottom:12px;">
            <h3 style="margin-bottom:10px;">${date}</h3>
            ${assignHTML}
          </div>`;
        }).join('');
    }

    function renderStudentsTab() {
      const students = dashboardData.leaderboard;
      if (!students || students.length === 0) {
        document.getElementById('studentsList').innerHTML = '<div class="card"><p style="color:var(--text-light); text-align:center;">No student data yet.</p></div>';
        return;
      }

      document.getElementById('studentsList').innerHTML = students.map(s => {
        return `<div class="card" style="margin-bottom:10px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; color:var(--primary);">${s.name}</h3>
            <div style="text-align:right; font-size:0.9rem;">
              <div><strong>${s.assignmentsCompleted}</strong> assignments</div>
              <div><strong>${s.accuracy}%</strong> accuracy</div>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    async function viewAssignment(assignmentId) {
      try {
        const res = await fetch(`/api/teacher/scores/${assignmentId}?pin=${teacherPin}`);
        const scores = await res.json();
        const assignment = dashboardData.allAssignments.find(a => a.id === assignmentId);
        const label = assignment ? `${assignment.label} (${assignment.date})` : 'Assignment';

        let html = `<div class="card" style="margin-bottom:15px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0;">${label}</h3>
            <button onclick="refreshDashboard(); switchTab('all');" class="btn btn-sm" style="background:#dfe6e9; color:var(--text-light);">Back</button>
          </div>`;

        if (scores.length === 0) {
          html += '<p style="color:var(--text-light);">No one has completed this assignment yet.</p>';
        } else {
          scores.forEach(s => {
            html += `<div style="background:var(--bg-light); border-radius:10px; padding:12px; margin-bottom:8px; border-left:3px solid var(--primary);">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <strong>${s.name}</strong>
                <span style="font-weight:700; color:var(--primary);">Best: ${s.bestScore} pts</span>
              </div>`;
            s.attempts.forEach(att => {
              html += `<div style="padding:4px 0 4px 20px; font-size:0.85rem; color:var(--text-light);">
                Attempt ${att.attempt}: <strong>${att.correct}/${att.total}</strong> (${Math.round(att.correct/att.total*100)}%) — <strong style="color:var(--primary);">${att.score} pts</strong>
                <span style="font-size:0.75rem;">${att.completedAt ? new Date(att.completedAt).toLocaleTimeString() : ''}</span>
              </div>`;
            });
            html += '</div>';
          });
        }

        html += '</div>';
        document.getElementById('allAssignments').innerHTML = html;
      } catch (e) { console.error(e); }
    }

    async function createAssignment() {
      const date = document.getElementById('assignDate').value;
      const label = document.getElementById('assignLabel').value.trim();
      const questionCount = parseInt(document.getElementById('assignCount').value);
      const timer = parseInt(document.getElementById('assignTimer').value);
      try {
        const res = await fetch('/api/teacher/assign', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: teacherPin, date, label, questionCount, timer })
        });
        const data = await res.json();
        const msg = document.getElementById('assignMsg');
        msg.style.display = 'block';
        msg.textContent = data.message || 'Created!';
        msg.style.color = data.success ? 'var(--success)' : 'var(--danger)';
        document.getElementById('assignLabel').value = '';
        refreshDashboard();
      } catch (e) { alert('Error creating assignment.'); }
    }

    async function exportData() {
      const res = await fetch(`/api/teacher/export?pin=${teacherPin}`);
      const data = await res.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `bible-quiz-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    async function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        const data = JSON.parse(text);
        const res = await fetch('/api/teacher/import', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: teacherPin, data })
        });
        const result = await res.json();
        alert(result.message || 'Imported!');
        refreshDashboard();
      } catch (e) { alert('Invalid backup file.'); }
    }

    // Auto-refresh every 30 seconds
    setInterval(() => { if (!document.getElementById('dashboardSection').classList.contains('hidden')) refreshDashboard(); }, 30000);
  </script>
</body>
</html>
